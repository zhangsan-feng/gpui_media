[package]
name = "gpui_music"
version = "0.1.0"
edition = "2024"

[dependencies]
gpui = {git = "https://github.com/zed-industries/zed"}
gpui-component = {git = "https://github.com/longbridge/gpui-component"}
gpui_platform = {git = "https://github.com/zed-industries/zed"}
reqwest_client = {git = "https://github.com/zed-industries/zed", package = "reqwest_client"}
log = {version = "0.4.29"}
chrono = {version = "0.4.43", features = ["default"]}
fern = "0.7.1"
reqwest = { version = "0.13.1", default-features = false, features = ["gzip", "json", "multipart", "form", "rustls", "stream"] }
serde = "1.0.228"
tokio-util = "0.7.18"
anyhow = "1.0.100"
tokio = {version = "1.49.0", features = ["full"]}
tokio-tungstenite="0.29.0"
futures-util="0.3.31"
serde_json = "1.0.149"
rust-embed = "8.11.0"
deno_core="0.393.0"
v8 = "146.9.0"
md5 = "0.8.0"
rodio = { version = "0.22.2", features = ["playback"] }
scraper= "0.26.0"
regex = "1.12.3"
uuid = { version = "1.22.0", features = ["v4"] }
gstreamer = "0.23.5"
gstreamer-app = "0.23.5"
gstreamer-video = "0.23.5"
image = "0.25.8"
url = "2.5.7"
